<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABDC 2025 Journal Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f5f7fb; }

.navbar {
    background:#0f172a; color:white;
    display:flex; justify-content:space-between;
    padding:15px 30px;
}

.hero {
    background:linear-gradient(135deg,#1e3a8a,#0f172a);
    color:white; text-align:center; padding:30px;
}

.container { max-width:1200px; margin:auto; padding:20px; }

.filters {
    background:white; padding:15px;
    border-radius:10px;
    display:grid;
    grid-template-columns:1fr 150px 150px 120px;
    gap:10px;
    margin-bottom:20px;
}

input, select, textarea {
    padding:10px;
    border-radius:6px;
    border:1px solid #ddd;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:15px;
}

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.badge {
    display:inline-block;
    padding:5px 10px;
    border-radius:20px;
    color:white;
    font-size:12px;
    margin-top:5px;
}

.Astar { background:red; }
.A { background:blue; }
.B { background:green; }
.C { background:gray; }

.pagination {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

button {
    padding:8px 15px;
    border:none;
    background:#1e3a8a;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

footer {
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>

<body>

<div class="navbar">
    <div>ABDC Finder</div>
    <div>Home | Journals | About</div>
</div>

<div class="hero">
    <h1>ABDC Journal Finder</h1>
</div>

<div class="container">

<!-- 🤖 AI RECOMMENDER -->
<div style="background:white;padding:20px;border-radius:10px;margin-bottom:20px;">
    <h2>🤖 AI Journal Recommendation</h2>

    <textarea id="abstract" placeholder="Paste your abstract here..."></textarea><br><br>

    <button onclick="recommend()">Find Matching Journals</button>

    <div id="aiResults"></div>
</div>

<!-- FILTER -->
<div class="filters">
    <input id="search" placeholder="Search journal, ISSN, publisher...">

    <select id="rank">
        <option value="">All Ranks</option>
        <option>A*</option>
        <option>A</option>
        <option>B</option>
        <option>C</option>
    </select>

    <select id="sort">
        <option value="">Sort</option>
        <option value="name">Name</option>
        <option value="rank">Rank</option>
    </select>

    <select id="perPage">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="50">50</option>
    </select>
</div>

<div id="count"></div>

<div class="grid" id="list"></div>

<div class="pagination">
    <button onclick="prevPage()">Prev</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">Next</button>
</div>

</div>

<footer>
    <p><strong>Powered by ABS Research Academy</strong></p>
    <p>Academics for Better Society</p>
</footer>

<script>

let data = [];
let filtered = [];
let currentPage = 1;
let perPage = 20;

// LOAD DATA
fetch("abdc_data.json")
.then(res => res.json())
.then(json => {
    data = json;
    applyFilters();
});

// FILTER FUNCTION
function applyFilters() {
    let keyword = search.value.toLowerCase();
    let r = rank.value;
    let s = sort.value;

    filtered = data.filter(j => {
        let text = `${j.journal_name} ${j.issn} ${j.publisher} ${j.field}`.toLowerCase();
        return text.includes(keyword) &&
               (r === "" || j.rank === r);
    });

    if (s === "name") {
        filtered.sort((a,b)=>a.journal_name.localeCompare(b.journal_name));
    }

    if (s === "rank") {
        const order = {"A*":1,"A":2,"B":3,"C":4};
        filtered.sort((a,b)=>(order[a.rank]||99)-(order[b.rank]||99));
    }

    currentPage = 1;
    render();
}

// RENDER
function render() {
    perPage = parseInt(perPageSelect.value);

    let start = (currentPage - 1) * perPage;
    let end = start + perPage;
    let pageData = filtered.slice(start, end);

    count.innerText = `Showing ${start+1}-${Math.min(end, filtered.length)} of ${filtered.length}`;

    let html = "";

    pageData.forEach(j => {
        let r = (j.rank || "").replace("*","star");

        html += `
        <div class="card">
            <b>${j.journal_name}</b>
            <div class="badge ${r}">${j.rank || ""}</div>
            <div>Field: ${j.field || ""}</div>
            <div>Publisher: ${j.publisher || "N/A"}</div>
            <div>ISSN: ${j.issn || ""}</div>
        </div>`;
    });

    list.innerHTML = html;

    let totalPages = Math.ceil(filtered.length / perPage);
    pageInfo.innerText = `Page ${currentPage} of ${totalPages}`;
}

// PAGINATION
function nextPage() {
    let totalPages = Math.ceil(filtered.length / perPage);
    if (currentPage < totalPages) {
        currentPage++;
        render();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        render();
    }
}

// 🤖 AI RECOMMENDER
function cleanText(text) {
    return text.toLowerCase()
        .replace(/[^\w\s]/g, "")
        .split(" ")
        .filter(w => w.length > 3);
}

// 🎯 Acceptance Probability Function
function predictAcceptance(journal, score, abstract) {

    // Match score (max 60)
    let matchScore = Math.min(score * 5, 60);

    // Rank difficulty
    let rankWeight = {
        "A*": 10,
        "A": 20,
        "B": 25,
        "C": 30
    };

    let rankScore = rankWeight[journal.rank] || 15;

    // Abstract quality
    let length = abstract.length;
    let qualityScore = 0;

    if (length > 150) qualityScore = 10;
    else if (length > 80) qualityScore = 7;
    else qualityScore = 3;

    // Final probability
    let total = matchScore + rankScore + qualityScore;

    return Math.min(Math.round(total), 95);
}

// 🚀 Main Recommendation Function
function recommend() {

    let abs = abstract.value;

    if (!abs || abs.length < 20) {
        alert("Please enter a meaningful abstract");
        return;
    }

    let keywords = cleanText(abs);

    let results = data.map(j => {

        let text = `${j.journal_name} ${j.field} ${j.publisher}`.toLowerCase();

        let score = 0;

        keywords.forEach(k => {
            if (text.includes(k)) score++;
        });

        return { ...j, score: score };
    });

    // Sort by relevance
    results.sort((a,b)=>b.score-a.score);

    let top = results.slice(0,10);

    let html = "<h3>Top Recommended Journals</h3>";

    top.forEach(j => {

        let r = (j.rank || "").replace("*","star");

        // 🎯 Calculate acceptance probability
        let prob = predictAcceptance(j, j.score, abs);

        // 🎨 Color logic
        let color = prob > 70 ? "green" :
                    prob > 40 ? "orange" : "red";

        html += `
        <div class="card">
            <b>${j.journal_name}</b>
            <div class="badge ${r}">${j.rank || ""}</div>
            <div>Field: ${j.field || ""}</div>
            <div>Publisher: ${j.publisher || "N/A"}</div>
            <div>ISSN: ${j.issn || ""}</div>
            
            <div><b>Match Score:</b> ${j.score}</div>

            <div style="margin-top:8px;">
                <b>Acceptance Probability:</b> 
                <span style="color:${color}; font-weight:bold;">
                    ${prob}%
                </span>
            </div>
        </div>`;
    });

    aiResults.innerHTML = html;
}

// EVENTS
search.addEventListener("input", applyFilters);
rank.addEventListener("change", applyFilters);
sort.addEventListener("change", applyFilters);
perPageSelect = document.getElementById("perPage");
perPageSelect.addEventListener("change", applyFilters);
top.forEach(j => {

    let r = (j.rank || "").replace("*","star");

    let prob = predictAcceptance(j, j.score, abs);

    let color = prob > 70 ? "green" : prob > 40 ? "orange" : "red";

    html += `
    <div class="card">
        <b>${j.journal_name}</b>
        <div class="badge ${r}">${j.rank || ""}</div>
        <div>Field: ${j.field || ""}</div>
        <div>Publisher: ${j.publisher || "N/A"}</div>
        <div>ISSN: ${j.issn || ""}</div>
        <div><b>Match Score:</b> ${j.score}</div>
        <div style="margin-top:8px;">
            <b>Acceptance Probability:</b> 
            <span style="color:${color};font-weight:bold;">
                ${prob}%
            </span>
        </div>
    </div>
    `;
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABDC Journal Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f7fb;
}

/* ===== NAVBAR ===== */
.navbar {
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    align-items: center;
}

.navbar .logo {
    font-weight: bold;
    font-size: 18px;
}

.navbar ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
}

.navbar ul li {
    cursor: pointer;
}

/* ===== HERO ===== */
.hero {
    background: linear-gradient(135deg, #1e3a8a, #0f172a);
    color: white;
    text-align: center;
    padding: 40px 20px;
}

.hero h1 {
    margin: 0;
    font-size: 32px;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

/* ===== FILTERS ===== */
.filters {
    background: white;
    padding: 15px;
    border-radius: 12px;
    display: grid;
    grid-template-columns: 1fr 150px 150px;
    gap: 10px;
    margin-bottom: 20px;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
}

/* ===== CARD ===== */
.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.08);
}

.title {
    font-weight: bold;
}

/* ===== BADGE ===== */
.badge {
    display: inline-block;
    margin-top: 8px;
    padding: 5px 12px;
    border-radius: 20px;
    color: white;
    font-size: 12px;
}

.Astar { background: #dc2626; }
.A { background: #2563eb; }
.B { background: #16a34a; }
.C { background: #6b7280; }

/* ===== FOOTER ===== */
footer {
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 25px;
    margin-top: 40px;
}

footer img {
    width: 120px;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">ABDC Finder</div>
    <ul>
        <li>Home</li>
        <li>Journals</li>
        <li>About</li>
        <li>Contact</li>
    </ul>
</div>

<!-- HERO -->
<div class="hero">
    <h1>ABDC Journal Finder</h1>
    <p>Search ABDC indexed journals by name, ISSN, field, or publisher</p>
</div>

<div class="container">

<!-- FILTER -->
<div class="filters">
    <input id="search" placeholder="Search by Journal Name, ISSN, Publisher, or Field...">

    <select id="rank">
        <option value="">All Ranks</option>
        <option>A*</option>
        <option>A</option>
        <option>B</option>
        <option>C</option>
    </select>

    <select id="sort">
        <option value="">Sort</option>
        <option value="name">Name A–Z</option>
        <option value="rank">Rank</option>
    </select>
</div>

<!-- RESULT COUNT -->
<div id="count">Loading...</div>

<!-- GRID -->
<div class="grid" id="list"></div>

</div>

<!-- FOOTER -->
<footer>
    <img src="logo.png" alt="ABS Logo">
    <p><strong>Powered by ABS Research Academy</strong></p>
    <p>Academics for Better Society</p>
</footer>

<script>

let data = [];

fetch("abdc_data.json")
.then(res => res.json())
.then(json => {
    data = json;
    render(data);
});

// RENDER
function render(arr) {
    document.getElementById("count").innerText =
        "Total Journals: " + arr.length;

    let html = "";

    arr.forEach(j => {
        let r = (j.rank || "").replace("*","star");

        html += `
        <div class="card">
            <div class="title">${j.journal_name}</div>
            <span class="badge ${r}">${j.rank || ""}</span>
            <div>Field: ${j.field || ""}</div>
            <div>Publisher: ${j.publisher || "Not Available"}</div>
            <div>ISSN: ${j.issn || ""}</div>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

// FILTER
document.getElementById("search").addEventListener("input", filter);
document.getElementById("rank").addEventListener("change", filter);
document.getElementById("sort").addEventListener("change", filter);

function filter() {
    let keyword = search.value.toLowerCase();
    let r = rank.value;
    let s = sort.value;

    let filtered = data.filter(j => {
        let text = `${j.journal_name} ${j.issn} ${j.publisher} ${j.field}`.toLowerCase();
        return text.includes(keyword) &&
               (r === "" || j.rank === r);
    });

    if (s === "name") {
        filtered.sort((a,b) => a.journal_name.localeCompare(b.journal_name));
    }

    if (s === "rank") {
        const order = {"A*":1,"A":2,"B":3,"C":4};
        filtered.sort((a,b) => (order[a.rank]||99)-(order[b.rank]||99));
    }

    render(filtered);
}

</script>

</body>
</html>
